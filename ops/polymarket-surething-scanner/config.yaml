runtime:
  mode: paper
  state_root: state/runtime
  execution_defaults:
    confirm_scans_required: 2
    order_size_usd: 1.0
    max_position_usd_per_market: 5.0
    max_total_exposure_usd: 20.0
    max_open_positions: 10
    max_orders_per_run: 1
    max_daily_orders: 10
    min_minutes_to_expiry: 90
    min_depth_multiple: 8.0
    allow_add_to_existing: false

scanner:
  hours_ahead: 72
  price_min: 0.92
  price_max: 0.99
  min_depth_usd: 10.0
  gamma_page_size: 100
  clob_pause_sec: 0.5
  stale_disagree_threshold: 0.07
  filter_restricted: false
  exclude_crypto: true
  exclude_stock_related: true
  exclude_sports_related: true
  exclude_high_randomness_narrative: true

paper:
  order_size_usd: 1.0
  max_position_usd_per_market: 20.0
  max_total_exposure_usd: 999999.0
  max_open_positions: 999999
  max_orders_per_run: 999999
  max_daily_orders: 999999
  allow_add_to_existing: true

shadow:
  order_size_usd: 2.0
  max_position_usd_per_market: 10.0
  max_total_exposure_usd: 25.0
  max_open_positions: 10
  max_orders_per_run: 2
  max_daily_orders: 10

live:
  enabled: true
  env_file: .env.live
  require_env_live_enabled: true
  order_size_usd: 1.0
  max_position_usd_per_market: 10.0
  max_total_exposure_usd: 25.0
  max_open_positions: 10
  max_orders_per_run: 1
  max_daily_orders: 6
  min_minutes_to_expiry: 120
  min_depth_multiple: 12.0
  allow_add_to_existing: false
  order_type: FOK
  post_only: false
  signature_type: 0
  min_collateral_balance_usd: 5.0
  require_empty_open_orders: true
  max_consecutive_errors: 3
  data_api_base: https://data-api.polymarket.com
  sync_recent_trades_limit: 1000
  settlement_grace_minutes: 180
  profile_address: ""
  claim_shell_command: ""
  claim_shell_timeout_sec: 120

risk:
  # Global guardrails applied before any execution mode-specific overrides.
  confirm_scans_required: 2
  min_minutes_to_expiry: 90
  min_depth_multiple: 8.0
  allow_add_to_existing: false

stop_loss:
  # Liquidate open positions when the mark drops sharply below entry. Runs
  # before the buy planner each scan. In live mode, dry_run=true only logs
  # intentions — no real sell orders are submitted.
  enabled: true
  absolute_price: 0.68       # trigger if best_bid <= this
  relative_drop: 0.25        # OR trigger if entry_price - best_bid >= this
  confirm_scans_required: 2  # must be below for this many consecutive scans
  min_bid_depth_usd: 20.0    # require this much bid-side liquidity (skip thin books)
  order_type: FOK
  dry_run: true              # LIVE: true = log-only (observation mode), false = real sell
  fast_recheck_sec: 300      # seconds to wait before re-checking first-hit tokens (0 = disable)

output:
  candidates_json: state/latest_candidates.json
  metrics_json: state/scan_metrics.json
  dashboard_html: state/dashboard.html
  paper_state_json: state/paper_state.json
  daily_stats_json: state/daily_stats.json
