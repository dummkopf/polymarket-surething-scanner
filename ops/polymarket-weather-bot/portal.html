<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polymarket Weather Portal (Fresh View)</title>
  <style>
    :root { --bg:#0b1020; --card:#121a33; --text:#e8edff; --muted:#9fb0e0; --ok:#1ec98f; --warn:#ffcc66; --bad:#ff6b6b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Inter, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1300px; margin:0 auto; padding:20px; }
    .muted { color:var(--muted); font-size:12px; }
    .toolbar { margin:10px 0 14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    button { background:#2a3a6d; color:#fff; border:none; border-radius:8px; padding:8px 12px; cursor:pointer; }
    .grid { display:grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap:12px; margin-bottom:14px; }
    .card { background:var(--card); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:12px; }
    .k { color:var(--muted); font-size:12px; }
    .v { margin-top:6px; font-size:22px; font-weight:700; }
    .ok{ color:var(--ok);} .warn{ color:var(--warn);} .bad{ color:var(--bad);} 
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th, td { border-bottom:1px solid rgba(255,255,255,.08); padding:8px 6px; text-align:left; }
    th { color:var(--muted); }
    .row { display:grid; grid-template-columns: 1.8fr 1fr; gap:12px; }
    @media (max-width:1100px){ .grid{ grid-template-columns: repeat(3,1fr);} .row{ grid-template-columns:1fr;} }
    @media (max-width:700px){ .grid{ grid-template-columns: repeat(2,1fr);} }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin:0">Polymarket Weather Dashboard — Fresh Only</h2>
    <div class="muted">默认只看 fresh baseline 之后的新仓位（避免历史4笔干扰）。</div>

    <div class="toolbar">
      <button onclick="refreshAll()">刷新</button>
      <button onclick="setFreshNow()">设置 Fresh 起点为现在</button>
      <label class="muted"><input id="auto" type="checkbox" checked /> 自动刷新(30s)</label>
      <span id="status" class="muted"></span>
    </div>

    <div class="grid">
      <div class="card"><div class="k">Fresh Open Positions</div><div id="openPositions" class="v">-</div></div>
      <div class="card"><div class="k">Fresh Exposure (USD)</div><div id="openExposure" class="v">-</div></div>
      <div class="card"><div class="k">Fresh Unrealized PnL</div><div id="unrealized" class="v">-</div></div>
      <div class="card"><div class="k">Latest Signals</div><div id="signals" class="v">-</div></div>
      <div class="card"><div class="k">Pending Settle</div><div id="pendingSettle" class="v">-</div></div>
      <div class="card"><div class="k">Last Runner Tick</div><div id="lastRun" class="v" style="font-size:13px">-</div></div>
    </div>

    <div class="card" style="margin-bottom:12px;">
      <div class="k">Fresh baseline</div>
      <div id="freshBaseline" class="v" style="font-size:14px">-</div>
    </div>

    <div class="row">
      <div class="card">
        <h3 style="margin-top:0">Fresh 持仓明细</h3>
        <table>
          <thead><tr><th>Market</th><th>Side</th><th>Cat</th><th>Size</th><th>Entry</th><th>Mark</th><th>PnL</th><th>Opened</th></tr></thead>
          <tbody id="positionsBody"></tbody>
        </table>
      </div>
      <div class="card">
        <h3 style="margin-top:0">最新信号</h3>
        <table>
          <thead><tr><th>Slug</th><th>Side</th><th>Price</th><th>Prob</th><th>Edge</th></tr></thead>
          <tbody id="signalsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
async function fetchJson(path){ const r=await fetch(path,{cache:'no-store'}); if(!r.ok) throw new Error(path+': '+r.status); return r.json(); }
async function fetchText(path){ const r=await fetch(path,{cache:'no-store'}); if(!r.ok) throw new Error(path+': '+r.status); return r.text(); }
const fmt=(n,d=2)=> (n===undefined||n===null||Number.isNaN(+n))?'-':Number(n).toFixed(d);
const fmtTime=(t)=>{ if(!t) return '-'; const d=new Date(t); return Number.isNaN(d.getTime())?String(t):d.toLocaleString(); };
const cls=(v)=> v>0?'ok':(v<0?'bad':'warn');

function getFreshTs(){
  const x=localStorage.getItem('pm_fresh_ts');
  if(x) return x;
  const now=new Date().toISOString();
  localStorage.setItem('pm_fresh_ts', now);
  return now;
}
function setFreshNow(){
  const now=new Date().toISOString();
  localStorage.setItem('pm_fresh_ts', now);
  refreshAll();
}

async function refreshAll(){
  const status=document.getElementById('status');
  status.textContent='刷新中...';
  try{
    const state=await fetchJson('./state/paper_state.json');
    const raw=await fetchText('./state/snapshots.jsonl');
    const lines=raw.trim().split('\n').filter(Boolean);
    const latest=lines.length?JSON.parse(lines[lines.length-1]):null;

    const freshTs=getFreshTs();
    const freshMs=new Date(freshTs).getTime();
    document.getElementById('freshBaseline').textContent = fmtTime(freshTs);

    const openAll=(state.open_positions||[]);
    const open=openAll.filter(p=>{
      const t=new Date(p.opened_at||0).getTime();
      return Number.isFinite(t) && t>=freshMs;
    });

    const exposure=open.reduce((a,p)=>a+(+p.size_usd||0),0);
    const unrealized=open.reduce((a,p)=>a+(+p.unrealized_pnl_usd||0),0);
    const pendingSettle=open.filter(p=>new Date(p.end_date||0).getTime()<=Date.now()).length;

    document.getElementById('openPositions').textContent=open.length;
    document.getElementById('openExposure').textContent='$'+fmt(exposure,2);
    const un=document.getElementById('unrealized');
    un.textContent=open.length?('$'+fmt(unrealized,2)):'-';
    un.className='v '+(open.length?cls(unrealized):'');
    document.getElementById('signals').textContent=(latest&&latest.scan)?latest.scan.signals:'-';
    const ps=document.getElementById('pendingSettle');
    ps.textContent=String(pendingSettle);
    ps.className='v '+(pendingSettle>0?'warn':'ok');
    document.getElementById('lastRun').textContent=fmtTime(state.last_run);

    const pb=document.getElementById('positionsBody'); pb.innerHTML='';
    if(!open.length) pb.innerHTML='<tr><td colspan="8" class="muted">暂无 fresh 持仓</td></tr>';
    open.forEach(p=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td title="${p.question||''}">${p.city_slug||''} ${p.target_date||''}</td><td>${p.side||''}</td><td>${p.category||''}</td><td>$${fmt(p.size_usd,2)}</td><td>${fmt(p.entry_price,4)}</td><td>${fmt(p.mark_price,4)}</td><td class="${cls(+p.unrealized_pnl_usd||0)}">$${fmt(p.unrealized_pnl_usd,4)}</td><td>${fmtTime(p.opened_at)}</td>`;
      pb.appendChild(tr);
    });

    const sb=document.getElementById('signalsBody'); sb.innerHTML='';
    const sigs=(latest&&latest.signals)?latest.signals:[];
    if(!sigs.length) sb.innerHTML='<tr><td colspan="5" class="muted">无新信号</td></tr>';
    sigs.forEach(s=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${s.slug||''}</td><td>${s.side||''}</td><td>${fmt(s.side_price,4)}</td><td>${fmt(s.side_prob,4)}</td><td>${fmt(s.edge,4)}</td>`;
      sb.appendChild(tr);
    });

    status.textContent='已刷新：'+new Date().toLocaleString();
  }catch(e){
    status.textContent='刷新失败: '+e.message;
  }
}

refreshAll();
setInterval(()=>{ if(document.getElementById('auto').checked) refreshAll(); },30000);
</script>
</body>
</html>
